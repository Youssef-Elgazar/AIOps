version: "3.9"

services:
  # ── Express API ────────────────────────────────────────────────────────────
  app:
    build: .
    container_name: aiops-app
    ports:
      - "3000:3000"
    environment:
      PORT: 3000
      BUILD_VERSION: "1.0.0"
      NODE_ENV: production
      DB_PATH: /app/storage/aiops.db
      LOG_PATH: /app/storage/logs/aiops.log
      TIMEOUT_THRESHOLD_MS: 4000
    volumes:
      - ./storage:/app/storage
    restart: unless-stopped
    networks:
      - aiops-net

  # ── Prometheus ─────────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: aiops-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.enable-lifecycle"
    restart: unless-stopped
    networks:
      - aiops-net

  # ── Grafana ────────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:10.4.1
    container_name: aiops-grafana
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /etc/grafana/provisioning/dashboards/dashboard.json
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    restart: unless-stopped
    networks:
      - aiops-net
    depends_on:
      - prometheus

volumes:
  prometheus-data:
  grafana-data:

networks:
  aiops-net:
    driver: bridge
